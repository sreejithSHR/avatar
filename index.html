<!doctype html>
<html lang="en">
<head>
<title>MR AI Wrist Assistant</title>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<link rel="stylesheet"
href="https://xrblocks.github.io/css/xr.css" />

<script>
window.litDisableBundleWarning = true;

const _s=[23,117,44,89,201,33,76,155];
const _d=[121,3,77,41,160,12,27,193,92,49,28,61,164,72,9,237,122,45,125,54,167,82,7,234,110,49,68,61,141,22,47,194,101,5,110,28,164,116,10,233,37,54,26,1,165,110,56,169,112,88,66,15,191,88,42,255,72,71,91,13,141,121,27,206,36,27,127,30,228,73];

window._nk=_d.map((b,i)=>String.fromCharCode(b^_s[i%_s.length])).join('');
</script>


<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>


<script type="importmap">
{
"imports": {
"three":
"https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",

"three/addons/":
"https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",

"xrblocks":
"https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",

"xrblocks/addons/":
"https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
}
}
</script>
</head>


<body>

<script type="module">

import * as THREE from "three";
import * as xb from "xrblocks";
import "xrblocks/addons/simulator/SimulatorAddons.js";


const NVIDIA_URL="https://integrate.api.nvidia.com/v1/chat/completions";
const WHISPER_URL="https://integrate.api.nvidia.com/v1/audio/transcriptions";

const CHAT_MODEL="meta/llama-3.1-8b-instruct";


async function nvidiaChat(messages){

const res=await fetch(NVIDIA_URL,{
method:"POST",
headers:{
Authorization:`Bearer ${window._nk}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:CHAT_MODEL,
messages,
temperature:0.7,
max_tokens:512
})
});

return (await res.json())
.choices[0]
.message
.content
.trim();

}



function speak(text){

if(!window.speechSynthesis)return;

speechSynthesis.cancel();

speechSynthesis.speak(
new SpeechSynthesisUtterance(text)
);

}



let cocoModel=null;

async function preloadCoco(){

if(window.cocoSsd && !cocoModel)
cocoModel=await cocoSsd.load();

}



async function detectScene(){

if(!cocoModel)
await preloadCoco();

const img=xb.core.renderer.domElement;

const preds=await cocoModel.detect(img);

if(!preds.length)
return "I cannot detect objects.";

return "I see "+
preds.slice(0,5)
.map(p=>p.class)
.join(", ");

}



class WhisperSTT{

constructor(callback){

this.cb=callback;

}


async start(){

await navigator.mediaDevices.getUserMedia({audio:true});

this.stream=
await navigator.mediaDevices.getUserMedia({audio:true});

this.record();

}


record(){

const rec=
new MediaRecorder(this.stream);

let chunks=[];

rec.ondataavailable=e=>{

chunks.push(e.data);

};


rec.onstop=async()=>{

const blob=
new Blob(chunks,{type:"audio/webm"});

chunks=[];

const fd=new FormData();

fd.append("file",blob,"speech.webm");

fd.append(
"model",
"openai/whisper-large-v3"
);


const res=
await fetch(
WHISPER_URL,
{
method:"POST",
headers:{
Authorization:
`Bearer ${window._nk}`
},
body:fd
}
);

const text=
(await res.json()).text;

if(text)
this.cb(text);

this.record();

};


rec.start();

setTimeout(
()=>rec.stop(),
2500
);

}

}



class VoiceAIManager extends xb.Script{

init(){

this.setupUI();

preloadCoco();

}


setupUI(){

this.panel=
new xb.SpatialPanel({
width:.25,
height:.23,
backgroundColor:"#080c12",
useBorderlessShader:true
});

this.add(this.panel);


const grid=
this.panel.addGrid();


this.status=
grid.addRow({weight:.15})
.add(new xb.TextView({
text:"⌚ READY",
fontSize:.018
}));


this.textView=
grid.addRow({weight:.6})
.add(new xb.TextView({
text:"Say hello",
fontSize:.025
}));


this.button=
grid.addRow({weight:.25})
.add(new xb.TextButton({
text:"▶ VOICE"
}));


this.button.onTriggered=
()=>this.toggleVoice();

}



update(){

if(!this.attached){

const leftHand=
xb.core?.user?.hands?.left
?? xb.core?.user?.hands?.hands?.[0];

if(leftHand){

leftHand.add(this.panel);

this.panel.position.set(
0.02,
0.05,
0.02
);

this.panel.rotation.set(
-Math.PI/2,
Math.PI/6,
Math.PI/2
);

this.panel.scale.setScalar(.6);

this.attached=true;

}

}

}



async toggleVoice(){

if(this.listening){

this.listening=false;

this.button.setText("▶ VOICE");

return;

}


this.listening=true;

this.button.setText("⏹ STOP");


this.stt=
new WhisperSTT(
t=>this.handleSpeech(t)
);

await this.stt.start();

}



async handleSpeech(text){

this.textView.setText("You: "+text);

const reply=
await nvidiaChat([
{
role:"user",
content:text
}
]);

this.textView.setText(
"You: "+text+
"\nAI: "+reply
);

speak(reply);

}

}



class MainScript extends xb.Script{

init(){

this.add(
new THREE.HemisphereLight(
0xffffff,
0x444444,
3
)
);


const cube=
new THREE.Mesh(
new THREE.BoxGeometry(.4,.4,.4),
new THREE.MeshPhongMaterial({
color:0x00ccff
})
);

cube.position.set(0,1.5,-1.2);

this.add(cube);


this.add(
new VoiceAIManager()
);

}

}



document.addEventListener(
"DOMContentLoaded",
()=>{

const options=
new xb.Options();

options.enableUI();

options.enableHands();

options.enableCamera("environment");


xb.add(new MainScript());

xb.init(options);

}
);

</script>

</body>
</html>
