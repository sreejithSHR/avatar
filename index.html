<!doctype html>
<html lang="en">
  <head>
    <title>Voice AI Cube | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;

      // XOR-encoded NVIDIA key — to update: node -e "const k='NEW_KEY',s=[23,117,44,89,201,33,76,155];console.log(JSON.stringify([...k].map((c,i)=>c.charCodeAt(0)^s[i%s.length])))"
      const _s = [23,117,44,89,201,33,76,155];
      const _d = [121,3,77,41,160,12,27,193,92,49,28,61,164,72,9,237,122,45,125,54,167,82,7,234,110,49,68,61,141,22,47,194,101,5,110,28,164,116,10,233,37,54,26,1,165,110,56,169,112,88,66,15,191,88,42,255,72,71,91,13,141,121,27,206,36,27,127,30,228,73];
      window._nk = _d.map((b,i) => String.fromCharCode(b ^ _s[i % _s.length])).join('');
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import 'xrblocks/addons/simulator/SimulatorAddons.js';

      const NVIDIA_URL  = 'https://integrate.api.nvidia.com/v1/chat/completions';
      const CHAT_MODEL  = 'moonshotai/kimi-k2.5';
      const VISION_MODEL = 'meta/llama-3.2-11b-vision-instruct';

      const VISION_TRIGGERS = [
        'what do you see','what do i see','what can you see','look around',
        'describe what you see','what is around',"what's around",'what is in front',
        'scan the room','use vision','open your eyes','analyze the environment'
      ];

      // ── NVIDIA API ──────────────────────────────────────────────────────────
      async function nvidiaChat(messages, model = CHAT_MODEL) {
        const res = await fetch(NVIDIA_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${window._nk}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ model, messages, max_tokens: 512, temperature: 0.8, stream: false })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const e = new Error(err?.detail || `HTTP ${res.status}`);
          e.status = res.status;
          throw e;
        }
        const data = await res.json();
        return data.choices[0].message.content.trim();
      }

      // ── TTS ─────────────────────────────────────────────────────────────────
      function speak(text) {
        if (!window.speechSynthesis || !text) return;
        speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.rate  = 1.05;
        utt.pitch = 1.0;
        speechSynthesis.speak(utt);
      }

      // ── Transcription display ───────────────────────────────────────────────
      class TranscriptionHandler {
        constructor(view) {
          this.view    = view;
          this.history = [];
          this.currentIn  = '';
          this.currentOut = '';
          this._interim   = '';
        }

        setInterim(text) { this._interim = text; this.refresh(); }

        addInput(text)  { this.currentIn  += text; this._interim = ''; this.refresh(); }
        addOutput(text) { this.currentOut += text; this.refresh(); }

        addStatus(text) { this.view.addText(`\n[${text}]\n`); }

        finalize() {
          if (this.currentIn.trim())  this.history.push({ role: 'You', text: this.currentIn.trim() });
          if (this.currentOut.trim()) this.history.push({ role: 'AI',  text: this.currentOut.trim() });
          this.currentIn = this.currentOut = this._interim = '';
          this.refresh();
        }

        refresh() {
          let c = '';
          this.history.slice(-3).forEach(h => { c += `${h.role}: ${h.text}\n\n`; });
          const inp = this.currentIn + this._interim;
          if (inp)           c += `You: ${inp}`;
          if (this.currentOut) {
            if (inp) c += '\n\n';
            c += `AI: ${this.currentOut}`;
          }
          this.view.setText(c || 'Ready to listen…');
        }

        clear() {
          this.history = [];
          this.currentIn = this.currentOut = this._interim = '';
          this.view.setText("Say hello, or ask 'What do you see?'");
        }
      }

      // ── AI Manager ──────────────────────────────────────────────────────────
      class VoiceAIManager extends xb.Script {
        constructor(avatar) {
          super();
          this.avatar           = avatar;
          this.isListening      = false;
          this.isVisionProcessing = false;
          this.history          = [];   // conversation memory
          this.recognition      = null;
          this.transcription    = null;
        }

        get isAIRunning() { return this.isListening; }

        init() {
          this.setupUI();
          this.setupSpeechRecognition();
        }

        setupUI() {
          this.panel = new xb.SpatialPanel({ width: 2.2, height: 1.4, backgroundColor: '#111111dd' });
          this.panel.position.set(0, 1.2, -1.8);
          this.add(this.panel);

          const grid    = this.panel.addGrid();
          const textRow = grid.addRow({ weight: 0.65 });
          const textView = new xb.ScrollingTroikaTextView({
            text: "Press START VOICE, or ask 'What do you see?'",
            fontSize: 0.045, textAlign: 'left'
          });
          textRow.add(textView);
          this.transcription = new TranscriptionHandler(textView);

          const btnRow    = grid.addRow({ weight: 0.35 });
          const voiceCol  = btnRow.addCol({ weight: 0.5 });
          this.toggleBtn  = voiceCol.addTextButton({
            text: '▶ START VOICE', backgroundColor: '#0088ff', fontColor: '#ffffff', fontSize: 0.15
          });
          this.toggleBtn.onTriggered = () => this.toggleVoice();

          const visionCol = btnRow.addCol({ weight: 0.5 });
          this.visionBtn  = visionCol.addTextButton({
            text: '👁 VISION', backgroundColor: '#34a853', fontColor: '#ffffff', fontSize: 0.15
          });
          this.visionBtn.onTriggered = () => this.analyzeEnvironment();
        }

        setupSpeechRecognition() {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SR) {
            this.transcription.addStatus('SpeechRecognition not available in this browser');
            return;
          }

          this.recognition = new SR();
          this.recognition.continuous     = true;
          this.recognition.interimResults = true;
          this.recognition.lang           = 'en-US';

          let pendingFinal = '';

          this.recognition.onresult = (e) => {
            let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
              if (e.results[i].isFinal) pendingFinal += e.results[i][0].transcript;
              else                       interim      += e.results[i][0].transcript;
            }
            this.transcription.setInterim(pendingFinal + interim);

            if (pendingFinal.trim()) {
              const text = pendingFinal.trim();
              pendingFinal = '';
              this.handleSpeech(text);
            }
          };

          this.recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
              this.transcription.addStatus('Mic permission denied — please allow microphone access');
              this.isListening = false;
              this.toggleBtn.setText('▶ START VOICE');
              this.toggleBtn.backgroundColor = '#0088ff';
            }
          };

          // Auto-restart while still active (browser stops on silence)
          this.recognition.onend = () => {
            if (this.isListening) {
              try { this.recognition.start(); } catch {}
            }
          };
        }

        toggleVoice() {
          if (this.isListening) {
            this.isListening = false;
            try { this.recognition?.stop(); } catch {}
            speechSynthesis.cancel();
            this.toggleBtn.setText('▶ START VOICE');
            this.toggleBtn.backgroundColor = '#0088ff';
            this.transcription.clear();
          } else {
            if (!this.recognition) {
              this.transcription.addStatus('SpeechRecognition not supported');
              return;
            }
            this.isListening = true;
            try { this.recognition.start(); } catch {}
            this.toggleBtn.setText('⏹ STOP VOICE');
            this.toggleBtn.backgroundColor = '#ff4444';
            this.transcription.addStatus('Listening…');
          }
        }

        async handleSpeech(text) {
          const lower = text.toLowerCase();
          if (VISION_TRIGGERS.some(t => lower.includes(t))) {
            await this.analyzeEnvironment();
            return;
          }

          this.transcription.addInput(text);
          this.history.push({ role: 'user', content: text });

          try {
            const reply = await nvidiaChat(this.history);
            this.transcription.addOutput(reply);
            this.history.push({ role: 'assistant', content: reply });
            speak(reply);
            this.transcription.finalize();
          } catch (err) {
            this._handleApiError(err, 'Chat');
          }
        }

        async analyzeEnvironment() {
          if (this.isVisionProcessing) return;

          this.isVisionProcessing = true;
          this.transcription.addStatus('Analyzing environment…');
          this.visionBtn.backgroundColor = '#888888';

          try {
            const base64Image = await xb.core.screenshotSynthesizer.getScreenshot();
            if (!base64Image) throw new Error('Could not capture screenshot.');

            const { strippedBase64, mimeType } = xb.parseBase64DataURL(base64Image);

            const reply = await nvidiaChat([{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:${mimeType};base64,${strippedBase64}` } },
                { type: 'text', text: 'Describe what you see in this environment and tell me one interesting fact about it.' }
              ]
            }], VISION_MODEL);

            this.transcription.addOutput(`[VISION] ${reply}\n`);
            speak(reply);
          } catch (err) {
            this._handleApiError(err, 'Vision');
          } finally {
            this.isVisionProcessing = false;
            this.visionBtn.backgroundColor = '#34a853';
          }
        }

        _handleApiError(err, label) {
          console.error(err);
          const s = String(err?.status || err?.message || '');
          if (s.includes('503') || s.includes('high demand') || s.includes('UNAVAILABLE')) {
            this.transcription.addStatus(`${label} is busy — try again in a moment`);
          } else if (s.includes('429') || s.includes('rate')) {
            this.transcription.addStatus(`${label} rate limit — slow down a little`);
          } else {
            this.transcription.addStatus(`${label} unavailable`);
          }
        }
      }

      // ── Main 3D Scene ───────────────────────────────────────────────────────
      class MainScript extends xb.Script {
        init() {
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));
          const dir = new THREE.DirectionalLight(0xffffff, 2);
          dir.position.set(5, 5, 5);
          this.add(dir);

          const mat = new THREE.MeshPhongMaterial({ color: 0x00ccff, emissive: 0x002244, shininess: 100 });
          this.cube = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
          this.cube.position.set(0, 1.5, -1.2);
          this.add(this.cube);

          this.aiManager = new VoiceAIManager(this.cube);
          this.add(this.aiManager);
          this.time = 0;
        }

        update() {
          const dt = xb.getDeltaTime();
          this.time += dt;
          this.cube.rotation.y += dt * 0.5;
          this.cube.rotation.z += dt * 0.3;

          const isActive = this.aiManager.isAIRunning || this.aiManager.isVisionProcessing;
          if (isActive) {
            const speed = this.aiManager.isVisionProcessing ? 10 : 5;
            this.cube.scale.setScalar(1.0 + Math.sin(this.time * speed) * 0.15);
            const target = this.aiManager.isVisionProcessing ? new THREE.Color(0x34a853) : new THREE.Color(0xff00ff);
            this.cube.material.color.lerp(target, 0.05);
          } else {
            this.cube.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            this.cube.material.color.lerp(new THREE.Color(0x00ccff), 0.05);
          }
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const options = new xb.Options();
        options.enableUI();
        options.enableHands();
        options.enableCamera('environment');

        // Request mic so the browser grants permission before recognition starts
        try {
          const s = await navigator.mediaDevices.getUserMedia({ audio: true });
          s.getTracks().forEach(t => t.stop());
        } catch { console.warn('Mic permission denied.'); }

        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
