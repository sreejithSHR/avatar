<!doctype html>
<html lang="en">
  <head>
    <title>Voice AI Cube | XR Blocks</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import { GeminiManager as CoreGeminiManager } from 'xrblocks/addons/ai/GeminiManager.js';

      // Required for desktop simulation UI
      import 'xrblocks/addons/simulator/SimulatorAddons.js';

      /**
       * Manages conversation transcription state and display.
       */
      class TranscriptionHandler {
        constructor(view) {
          this.view = view;
          this.history = [];
          this.currentIn = "";
          this.currentOut = "";
        }

        addInput(text) {
          this.currentIn += text;
          this.refresh();
        }

        addOutput(text) {
          this.currentOut += text;
          this.refresh();
        }

        addStatus(text) {
          this.view.addText(`\n[${text}]\n`);
        }

        finalize() {
          if (this.currentIn.trim()) this.history.push({ role: 'You', text: this.currentIn.trim() });
          if (this.currentOut.trim()) this.history.push({ role: 'AI', text: this.currentOut.trim() });
          this.currentIn = "";
          this.currentOut = "";
          this.refresh();
        }

        refresh() {
          let content = "";
          // Show last 3 exchanges
          this.history.slice(-3).forEach(h => {
            content += `${h.role}: ${h.text}\n\n`;
          });
          if (this.currentIn) content += `You: ${this.currentIn}`;
          if (this.currentOut) {
            if (this.currentIn) content += '\n\n';
            content += `AI: ${this.currentOut}`;
          }
          this.view.setText(content || "Ready to listen...");
        }

        clear() {
          this.history = [];
          this.currentIn = "";
          this.currentOut = "";
          this.view.setText("Say 'Hello' or use Vision...");
        }
      }

      /**
       * AI Manager handling Gemini Live Voice and Vision interactions.
       */
      class VoiceAIManager extends CoreGeminiManager {
        constructor(avatar) {
          super();
          this.avatar = avatar;
          this.transcription = null;
          this.isVisionProcessing = false;
        }

        init() {
          super.init();
          this.setupUI();

          // Listen for AI events
          this.addEventListener('inputTranscription', (e) => this.transcription?.addInput(e.message));
          this.addEventListener('outputTranscription', (e) => this.transcription?.addOutput(e.message));
          this.addEventListener('turnComplete', () => this.transcription?.finalize());
        }

        setupUI() {
          this.panel = new xb.SpatialPanel({
            width: 2.2,
            height: 1.4,
            backgroundColor: '#111111dd'
          });
          this.panel.position.set(0, 1.2, -1.8);
          this.add(this.panel);

          const grid = this.panel.addGrid();
          
          // Transcription View
          const textRow = grid.addRow({ weight: 0.65 });
          const textView = new xb.ScrollingTroikaTextView({
            text: 'Press START to chat, or VISION to analyze surroundings.',
            fontSize: 0.045,
            textAlign: 'left'
          });
          textRow.add(textView);
          this.transcription = new TranscriptionHandler(textView);

          // Controls
          const btnRow = grid.addRow({ weight: 0.35 });
          
          // Voice Toggle
          const voiceCol = btnRow.addCol({ weight: 0.5 });
          this.toggleBtn = voiceCol.addTextButton({
            text: '▶ START VOICE',
            backgroundColor: '#0088ff',
            fontColor: '#ffffff',
            fontSize: 0.15
          });
          this.toggleBtn.onTriggered = () => this.toggleVoice();

          // Vision Button
          const visionCol = btnRow.addCol({ weight: 0.5 });
          this.visionBtn = visionCol.addTextButton({
            text: '👁 VISION ANALYZE',
            backgroundColor: '#34a853',
            fontColor: '#ffffff',
            fontSize: 0.15
          });
          this.visionBtn.onTriggered = () => this.analyzeEnvironment();
        }

        async toggleVoice() {
          if (this.isAIRunning) {
            await this.stopGeminiLive();
            this.toggleBtn.setText('▶ START VOICE');
            this.toggleBtn.backgroundColor = '#0088ff';
            this.transcription.clear();
          } else {
            try {
              await xb.core.sound.enableAudio();
              await this.startGeminiLive();
              this.toggleBtn.setText('⏹ STOP VOICE');
              this.toggleBtn.backgroundColor = '#ff4444';
            } catch (err) {
              console.error(err);
            }
          }
        }

        async analyzeEnvironment() {
          if (this.isVisionProcessing || !xb.core.ai?.isAvailable()) return;
          
          this.isVisionProcessing = true;
          this.transcription.addStatus("Analyzing environment...");
          this.visionBtn.backgroundColor = '#888888';

          try {
            // Capture current view
            const base64Image = await xb.core.screenshotSynthesizer.getScreenshot();
            if (!base64Image) throw new Error("Could not capture screenshot.");

            const { strippedBase64, mimeType } = xb.parseBase64DataURL(base64Image);
            
            const prompt = "Describe what you see in this environment and tell me one interesting fact about it.";
            const response = await xb.core.ai.query({
              type: 'multiPart',
              parts: [
                { inlineData: { mimeType, data: strippedBase64 } },
                { text: prompt }
              ]
            });

            this.transcription.addOutput(`[VISION] ${response.text}\n`);
          } catch (err) {
            console.error(err);
            this.transcription.addOutput(`[VISION ERROR] ${err.message}\n`);
          } finally {
            this.isVisionProcessing = false;
            this.visionBtn.backgroundColor = '#34a853';
          }
        }
      }

      /**
       * Main Script extending xb.Script
       */
      class MainScript extends xb.Script {
        init() {
          // Add Lights
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2);
          dirLight.position.set(5, 5, 5);
          this.add(dirLight);

          // Create the Cube Avatar
          const geometry = new THREE.BoxGeometry(0.4, 0.4, 0.4);
          const material = new THREE.MeshPhongMaterial({ 
            color: 0x00ccff,
            emissive: 0x002244,
            shininess: 100 
          });
          this.cube = new THREE.Mesh(geometry, material);
          this.cube.position.set(0, 1.5, -1.2);
          this.add(this.cube);

          // Initialize AI
          this.aiManager = new VoiceAIManager(this.cube);
          this.add(this.aiManager);

          this.time = 0;
        }

        update() {
          const dt = xb.getDeltaTime();
          this.time += dt;

          // Constant rotation
          this.cube.rotation.y += dt * 0.5;
          this.cube.rotation.z += dt * 0.3;

          // Pulse effect when AI (Voice or Vision) is active
          const isActive = this.aiManager.isAIRunning || this.aiManager.isVisionProcessing;
          
          if (isActive) {
            const speed = this.aiManager.isVisionProcessing ? 10 : 5;
            const pulse = 1.0 + Math.sin(this.time * speed) * 0.15;
            this.cube.scale.setScalar(pulse);
            
            const targetColor = this.aiManager.isVisionProcessing ? new THREE.Color(0x34a853) : new THREE.Color(0xff00ff);
            this.cube.material.color.lerp(targetColor, 0.05);
          } else {
            this.cube.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            this.cube.material.color.lerp(new THREE.Color(0x00ccff), 0.05);
          }
        }
      }

      // Permissions Helper
      async function requestMicrophone() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(t => t.stop());
          return true;
        } catch (e) {
          console.warn("Microphone access needed for AI voice features.");
          return false;
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const options = new xb.Options();
        options.enableUI();
        options.enableAI();
        options.enableHands();
        options.enableCamera('environment'); // Needed for Vision

        await requestMicrophone();
        
        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
